seed: 42

data:
  data_dir: "ham10000/data"
  num_workers: 2
  img_size: 224
  augment: true

model:
  architecture: efficientnet_b0
  num_classes: 7
  metadata_dim: 0
  pretrained: true
  dropout: 0.3
  freeze_epochs: 0

train:
  epochs: 35
  batch_size: 32
  lr: 0.0001             # same as ResNet baseline — not lower
  weight_decay: 0.0001   # same as ResNet baseline — not higher
  scheduler: cosine
  gradient_accumulation: 1
  max_grad_norm: 1.0
  use_ema: false
  early_stopping_patience: 35

loss:
  name: cross_entropy    # no label smoothing

output:
  checkpoint_dir: "ham10000/checkpoints/efficientnet_b0_best"

logging:
  experiment_name: efficientnet_b0_best
  save_dir: experiments/efficientnet_b0_best
  checkpoint_dir: ham10000/checkpoints/efficientnet_b0_best