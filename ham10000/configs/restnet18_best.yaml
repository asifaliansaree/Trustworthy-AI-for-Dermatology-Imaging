seed: 42

data:
  data_dir: "ham10000/data"
  num_workers: 2
  img_size: 224
  augment: true

model:
  architecture: resnet18
  num_classes: 7
  metadata_dim: 0
  pretrained: true
  dropout: 0.3           # same as your original baseline
  freeze_epochs: 0

train:
  epochs: 35             # more epochs than original 20
  batch_size: 32
  lr: 0.0001             # same as original baseline — this worked
  weight_decay: 0.0001   # same as original baseline — this worked
  scheduler: cosine
  gradient_accumulation: 1
  max_grad_norm: 1.0
  use_ema: false
  early_stopping_patience: 35

loss:
  name: cross_entropy    # no label smoothing — same as original baseline

output:
  checkpoint_dir: "ham10000/checkpoints/resnet18_best"

logging:
  experiment_name: resnet18_best
  save_dir: experiments/resnet18_best
  checkpoint_dir: ham10000/checkpoints/resnet18_best