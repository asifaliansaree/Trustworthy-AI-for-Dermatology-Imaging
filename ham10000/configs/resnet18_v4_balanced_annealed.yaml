seed: 42
data:
  augment: true
  data_dir: /kaggle/working/Trustworthy-AI-for-Dermatology-Imaging/ham10000/data
  img_size: 224
  num_workers: 2
logging:
  checkpoint_dir: ham10000/checkpoints/resnet18_v4_balanced_annealed
  experiment_name: resnet18_v4_balanced_annealed
  save_dir: experiments/resnet18_v4_balanced_annealed
loss:
  name: focal
  focal_gamma: 1.0
model:
  architecture: resnet18
  dropout: 0.3
  freeze_epochs: 0
  metadata_dim: 0
  num_classes: 7
  pretrained: true
output:
  checkpoint_dir: ham10000/checkpoints/resnet18_v4_balanced_annealed
train:
  batch_size: 32
  early_stopping_patience: 18
  epochs: 25
  gradient_accumulation: 1
  lr: 0.0001
  max_grad_norm: 1.0
  scheduler: cosine
  use_ema: false
  use_weighted_sampler: true
  weight_decay: 0.0001
