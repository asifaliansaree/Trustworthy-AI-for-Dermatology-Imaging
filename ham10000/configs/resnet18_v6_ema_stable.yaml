seed: 42
data:
  augment: true
  data_dir: /kaggle/working/Trustworthy-AI-for-Dermatology-Imaging/ham10000/data
  img_size: 224
  num_workers: 2
logging:
  checkpoint_dir: ham10000/checkpoints/resnet18_v6_stable
  experiment_name: resnet18_v6_stable
  save_dir: experiments/resnet18_v6_stable
loss:
  name: weighted_focal
  alpha_mode: effective_num
  effective_num_beta: 0.99      # softened from 0.999 -> avoid double-correcting now that the sampler also rebalances
  focal_gamma: 1.5
  class_counts:
  - 890
  - 5367
  - 412
  - 257
  - 891
  - 86
  - 114
model:
  architecture: resnet18
  dropout: 0.4                  # was 0.35 -> slightly stronger regularization to close train/val gap
  freeze_epochs: 3              # was 0 -> let the new classifier head settle before unfreezing backbone
  metadata_dim: 0
  num_classes: 7
  pretrained: true
output:
  checkpoint_dir: ham10000/checkpoints/resnet18_v6_stable
train:
  batch_size: 32
  early_stopping_patience: 15   # was 12 -> give the smoothed-metric selection more room
  ema_decay: 0.998              # was 0.999 -> track improvements slightly faster while still smoothing
  epochs: 50
  gradient_accumulation: 2      # effective batch size 64 -> less noisy gradients for minority classes
  lr: 0.0001
  lr_warmup_epochs: 3           # new -> linear warmup before cosine decay (add support in scheduler code if not present)
  max_grad_norm: 1.0
  scheduler: cosine
  use_ema: true
  use_weighted_sampler: true    # was false -> THE key fix for the epoch-to-epoch balanced accuracy swings
  weight_decay: 0.0004          # was 0.0002 -> slightly stronger to close the train/val loss gap
  best_metric_smoothing_window: 3   # new -> select checkpoint on 3-epoch moving average of val balanced accuracy, not raw spike