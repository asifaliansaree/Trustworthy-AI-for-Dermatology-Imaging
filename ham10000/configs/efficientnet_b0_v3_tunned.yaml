seed: 42

data:
  data_dir: "ham10000/data"
  num_workers: 2
  img_size: 224
  augment: true

model:
  architecture: efficientnet_b0
  num_classes: 7
  metadata_dim: 0
  pretrained: true
  dropout: 0.5           # increased from 0.3 — more regularization
  freeze_epochs: 0

train:
  epochs: 30
  batch_size: 32
  lr: 0.00003            # significantly reduced from 2e-4
  weight_decay: 0.001    # 10x stronger L2 than original — supervisor's fix
  scheduler: cosine
  gradient_accumulation: 1
  max_grad_norm: 1.0
  use_ema: false
  early_stopping_patience: 30

loss:
  name: label_smoothing
  label_smoothing: 0.15  # slightly stronger smoothing

output:
  checkpoint_dir: "ham10000/checkpoints/efficientnet_b0_v3_tuned"

logging:
  experiment_name: efficientnet_b0_v3_tuned
  save_dir: experiments/efficientnet_b0_v3_tuned
  checkpoint_dir: ham10000/checkpoints/efficientnet_b0_v3_tuned