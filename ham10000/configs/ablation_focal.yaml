seed: 42

data:
  data_dir: "ham10000/data"
  num_workers: 2

model:
  num_classes: 7
  metadata_dim: 0        
  pretrained: true
  dropout: 0.3
  metadata_dim: 0 
train:
  lr: MEASURED_LR
  scheduler: onecycle
  epochs: 20
loss:
  name: focal
  focal_gamma: 2.0
logging:
  experiment_name: ablation_focal

output:
  checkpoint_dir: ham10000/results/checkpoints/ablation_focal
# IMPORTANT: also disable class_weights in train.py for this run