seed: 42
data:
  augment: true
  data_dir: /kaggle/working/Trustworthy-AI-for-Dermatology-Imaging/ham10000/data
  img_size: 224
  num_workers: 2
logging:
  checkpoint_dir: ham10000/checkpoints/resnet18_v6_ema_sampler
  experiment_name: resnet18_v6_ema_sampler
  save_dir: experiments/resnet18_v6_ema_sampler
loss:
  name: weighted_focal
  alpha_mode: effective_num
  effective_num_beta: 0.99        # gentler than v5's 0.999 -- see note 3 below
  focal_gamma: 1.5
  class_counts:
  - 890
  - 5367
  - 412
  - 257
  - 891
  - 86
  - 114
model:
  architecture: resnet18
  dropout: 0.35
  freeze_epochs: 0
  metadata_dim: 0
  num_classes: 7
  pretrained: true
output:
  checkpoint_dir: ham10000/checkpoints/resnet18_v6_ema_sampler
train:
  batch_size: 32
  early_stopping_patience: 12
  ema_decay: 0.999
  epochs: 45
  gradient_accumulation: 1
  lr: 0.0001
  lr_warmup_epochs: 3             # new -- see note 2 below
  max_grad_norm: 1.0
  scheduler: cosine
  use_ema: true
  use_weighted_sampler: true      # new -- see note 1 below
  weight_decay: 0.0003            # nudged up from 0.0002 -- see note 4 below
  best_metric_smoothing_window: 5 # new -- see note 5 below