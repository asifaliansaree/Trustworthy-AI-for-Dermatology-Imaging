seed: 42
data:
  augment: true
  data_dir: /kaggle/working/Trustworthy-AI-for-Dermatology-Imaging/ham10000/data
  img_size: 224
  num_workers: 2
logging:
  checkpoint_dir: ham10000/checkpoints/resnet18_v2_inverse_test
  experiment_name: resnet18_v2_inverse_test
  save_dir: experiments/resnet18_v2_inverse_test
loss:
  name: weighted_focal
  alpha_mode: inverse
  focal_gamma: 2.0
model:
  architecture: resnet18
  dropout: 0.4
  freeze_epochs: 4
  metadata_dim: 0
  num_classes: 7
  pretrained: true
output:
  checkpoint_dir: ham10000/checkpoints/resnet18_v2_inverse_test
train:
  batch_size: 32
  early_stopping_patience: 10
  ema_decay: 0.999
  epochs: 45
  gradient_accumulation: 1
  lr: 7.94e-05
  max_grad_norm: 1.0
  scheduler: cosine
  use_ema: true
  use_weighted_sampler: false
  weight_decay: 0.0005
